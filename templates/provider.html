<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provider Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0F172A;
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.container{
    padding:40px;
}

.card-box{
    background:#1E293B;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

table{
    color:white !important;
}
</style>

</head>
<body>

<div class="container">

    <h1>Provider Dashboard</h1>
    <p class="text-secondary">Manage your services and booking requests.</p>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card-box">
                <h3>12</h3>
                <p>Total Services</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h3>8</h3>
                <p>Pending Requests</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h3>24</h3>
                <p>Completed Jobs</p>
            </div>
        </div>

    </div>

    <div class="card-box mt-4">

        <h4>Recent Requests</h4>

        <table class="table table-dark mt-3">

            <tr>
                <th>Customer</th>
                <th>Service</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Rahul</td>
                <td>Electrician</td>
                <td>Pending</td>
            </tr>

            <tr>
                <td>Priya</td>
                <td>Plumber</td>
                <td>Accepted</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
