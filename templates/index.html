<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartServe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
            font-family:'Segoe UI',sans-serif;
        }

        .welcome-box{
            text-align:center;
        }

        .logo{
            width:220px;
            height:220px;
            object-fit:contain;
            margin-bottom:20px;
        }

        h1{
            color:white;
            font-size:4rem;
            font-weight:800;
            letter-spacing:2px;
        }

        p{
            color:#94a3b8;
            font-size:1.2rem;
            margin-top:10px;
            margin-bottom:35px;
        }

        .enter-btn{
            background:#3b82f6;
            border:none;
            padding:15px 45px;
            border-radius:15px;
            font-size:18px;
            font-weight:600;
        }

        .enter-btn:hover{
            background:#2563eb;
        }

    </style>
</head>

<body>

    <div class="welcome-box">

        <img src="{{ url_for('static', filename='images/logo.png') }}"
             class="logo"
             alt="SmartServe Logo">

        <h1>SmartServe</h1>

        <p>
            Smart Local Service Allocation Platform
        </p>

        <a href="/login" class="btn btn-primary enter-btn">
            Enter
        </a>

    </div>

</body>
</html>
