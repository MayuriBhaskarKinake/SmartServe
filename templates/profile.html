<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0F172A;
            color:white;
            font-family:'Segoe UI';
        }

        .profile-card{
            width:500px;
            margin:80px auto;
            background:#1E293B;
            padding:30px;
            border-radius:20px;
            text-align:center;
        }

        .profile-pic{
            width:120px;
            height:120px;
            border-radius:50%;
            margin-bottom:20px;
        }

        .btn-edit{
            background:#3B82F6;
            border:none;
        }

    </style>

</head>
<body>

<div class="profile-card">

    <img src="https://via.placeholder.com/120"
         class="profile-pic">

    <h2>Mayuri</h2>

    <p>Email: mayuri@gmail.com</p>

    <p>Phone: 9876543210</p>

    <p>Role: Customer</p>

    <button class="btn btn-edit text-white">
        Edit Profile
    </button>

</div>

</body>
</html>
