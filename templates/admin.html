<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0F172A;
    color:white;
    font-family:'Segoe UI';
}

.container{
    margin-top:40px;
}

.card-box{
    background:#1E293B;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

table{
    color:white !important;
}

</style>

</head>
<body>

<div class="container">

    <h1>Admin Dashboard</h1>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card-box">
                <h2>150</h2>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h2>45</h2>
                <p>Providers</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h2>320</h2>
                <p>Bookings</p>
            </div>
        </div>

    </div>

    <div class="mt-5">

        <h3>User Management</h3>

        <table class="table table-dark mt-3">

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>

            <tr>
                <td>Mayuri</td>
                <td>mayuri@gmail.com</td>
                <td>Customer</td>
            </tr>

            <tr>
                <td>Rahul</td>
                <td>rahul@gmail.com</td>
                <td>Provider</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
