<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartServe Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0F172A;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            background:#1E293B;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 30px rgba(0,0,0,0.4);
        }

        .logo{
            width:90px;
            display:block;
            margin:auto;
            margin-bottom:15px;
        }

        h2{
            text-align:center;
            color:white;
            margin-bottom:30px;
            font-weight:700;
        }

        .form-control{
            background:#334155;
            border:none;
            color:white;
            height:50px;
            margin-bottom:15px;
        }

        .form-control:focus{
            background:#475569;
            color:white;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            height:50px;
            border:none;
            border-radius:10px;
            background:#3B82F6;
            color:white;
            font-size:16px;
            font-weight:600;
        }

        .btn-login:hover{
            background:#2563EB;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            color:#60A5FA;
            text-decoration:none;
        }

        .register-link p{
            color:#CBD5E1;
        }

    </style>

</head>
<body>

<div class="login-card">

    <img src="{{ url_for('static', filename='images/logo.png') }}"
         class="logo"
         alt="SmartServe Logo">

    <h2>Welcome Back</h2>

    <form>

        <input
            type="email"
            class="form-control"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            class="form-control"
            placeholder="Password"
            required
        >

        <!-- Temporary Dashboard Redirect -->
        <a href="/customer" class="btn btn-login">
            Login
        </a>

    </form>

    <div class="register-link">
        <p>
            Don't have an account?
            <a href="/register">Create Account</a>
        </p>
    </div>

</div>

</body>
</html>
