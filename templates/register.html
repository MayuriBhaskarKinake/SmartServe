<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartServe - Register Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary bg-black px-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="/static/images/logo.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top me-2">
                <span class="fw-bold text-info">SmartServe</span>
            </a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item ms-2"><a class="btn btn-info text-dark btn-sm fw-bold" href="/register">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-black border-secondary text-light shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold mb-4 text-info">Join SmartServe</h2>
                        
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted">Username</label>
                                <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required placeholder="Choose a username">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Email Address</label>
                                <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required placeholder="name@example.com">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Password</label>
                                <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required placeholder="••••••••">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted">Account Classification Role</label>
                                <select name="role" id="roleSelector" class="form-select bg-dark text-light border-secondary" required>
                                    <option value="customer" selected>Customer (Looking for Services)</option>
                                    <option value="provider">Service Provider (Offering Expertise)</option>
                                </select>
                            </div>

                            <div id="customerFields" class="mb-4">
                                <label class="form-label text-muted">Phone Number</label>
                                <input type="text" name="phone" class="form-control bg-dark text-light border-secondary" placeholder="+1 (555) 000-0000">
                            </div>

                            <div id="providerFields" class="mb-4 d-none">
                                <div class="mb-3">
                                    <label class="form-label text-muted">Service Specialty Field</label>
                                    <input type="text" name="service_type" class="form-control bg-dark text-light border-secondary" placeholder="e.g., Plumbing, Electrical, IT Repair">
                                </div>
                                <div>
                                    <label class="form-label text-muted">Pricing Rate ($
